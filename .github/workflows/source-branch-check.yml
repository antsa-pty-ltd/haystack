name: Source branch

# Blocks PRs into master that originate from any branch other than develop.
# Required status check on master per branch protection ruleset.

on:
  pull_request:
    branches: [master]

jobs:
  develop-only:
    # Job display name MUST equal the required status-check context in the
    # master-protection ruleset ("Source branch / develop-only"), matching the
    # web/api repos. A mismatch leaves the required check stuck "Expected" and
    # blocks develop→master promotion PRs.
    name: Source branch / develop-only
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is develop
        run: |
          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "::error::PRs into master must come from 'develop'. Got: '${{ github.head_ref }}'"
            exit 1
          fi
          echo "Source branch is develop. OK."
