name: Promote develop to master

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are we promoting now? (e.g. "ship feature X")'
        required: true

jobs:
  open-promotion-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build commit list
        id: commits
        run: |
          git fetch origin master
          COMMITS=$(git log origin/master..origin/develop --pretty=format:'- %h %s' | head -50)
          {
            echo 'commits<<EOF'
            echo "${COMMITS}"
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          echo "develop_sha=$(git rev-parse origin/develop)" >> $GITHUB_OUTPUT

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(cat <<EOF
          ## Promotion: develop → master

          **Reason:** ${{ inputs.reason }}

          **develop HEAD:** \`${{ steps.commits.outputs.develop_sha }}\`

          ### Commits being promoted

          ${{ steps.commits.outputs.commits }}

          ### Pre-merge checklist

          - [ ] Latest \`Staging smoke\` run on \`infra\` is green (https://github.com/antsa-pty-ltd/infra/actions/workflows/staging-smoke.yml)
          - [ ] The smoke run covered the develop SHA above (or a later one)
          - [ ] No open Sev-1 bugs flagged on staging
          - [ ] If this PR has cross-service deps, the dependent services have already been promoted (or are in this same promotion window)

          🤖 Auto-generated by promote-to-master.yml
          EOF
          )
          gh pr create \
            --base master \
            --head develop \
            --title "Promote develop to master: ${{ inputs.reason }}" \
            --body "${PR_BODY}"
